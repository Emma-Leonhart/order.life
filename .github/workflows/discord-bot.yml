name: Discord Daily Reading Bot

on:
  schedule:
    # Run every 3 hours for reliability — state file prevents duplicate posts
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install requests

      - run: python discord-bot/bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit state file if changed
        run: |
          git config user.name "discord-bot[bot]"
          git config user.email "discord-bot[bot]@users.noreply.github.com"
          git add discord-bot/state.json
          git diff --cached --quiet || git commit -m "Update Discord bot state"
          git push || echo "Push failed (concurrent update?), will retry next run"
